name: Bug report
description: Report a defect in swift-wirelet (runtime, macros, codegen, or a bridge).
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can â€” a minimal
        reproducible example makes triage dramatically faster.

        Do **not** report security vulnerabilities here. Use the Security tab â†’
        "Report a vulnerability" instead (see `SECURITY.md`).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: affected-side
    attributes:
      label: Affected side
      description: Which part of the toolkit is affected?
      multiple: true
      options:
        - Swift runtime / macros
        - Kotlin runtime / Gradle plugin
        - Codegen (emit-wirelet-* / Kotlin emitter / schema parser)
        - Observable bridge (@WireletObservable)
        - Provided bridge (@WireletProvided)
        - Documentation
        - Not sure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to trigger the bug. Include the smallest `@WireFormat` /
        `@WireletObservable` / `@WireletProvided` declaration and command(s)
        that reproduce it.
      placeholder: |
        1. Declare `@WireFormat struct Foo { â€¦ }`
        2. Run `swift test` (or `emit-wirelet-kotlin â€¦`, `./kotlin/gradlew â€¦`)
        3. Observe â€¦
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Paste error output / generated code in a code block.
    validations:
      required: true
  - type: input
    id: swift-version
    attributes:
      label: Swift toolchain version
      description: Output of `swift --version`.
      placeholder: "swift-6.0-RELEASE / Apple Swift version 6.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      description: Operating system and version (and target platform, if cross-compiling).
      placeholder: "macOS 15.4 (host) â†’ aarch64-unknown-linux-android28 (target)"
    validations:
      required: true
  - type: input
    id: kotlin-gradle
    attributes:
      label: Kotlin / Gradle version
      description: Relevant only if the Kotlin side is involved. Kotlin and Gradle versions plus the wirelet plugin version.
      placeholder: "Kotlin 2.0.0, Gradle 8.7, io.github.jiyimeta.wirelet <plugin version>"
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help â€” links, logs, screenshots, related issues.
    validations:
      required: false
