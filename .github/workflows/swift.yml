name: Swift

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift (override Xcode-bundled Swift on macOS too)
        # The package is developed and formatted against Swift 6.3.2 and uses
        # trailing commas in positions (e.g. multiline tuple types) that only
        # newer toolchains accept. macOS-14's bundled Swift and Ubuntu's
        # default are older and reject the syntax, so pin 6.3.2 on every runner
        # (swift-actions/setup-swift@v2 lacks 6.3.2; SwiftyLab covers it).
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.3.2'

      - name: swift --version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test
