name: Swift

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: swift --version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test
