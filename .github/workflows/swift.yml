name: Swift

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift (override Xcode-bundled Swift on macOS too)
        # The package uses trailing commas in init parameter lists
        # (SE-0463 / Swift 6.1). macOS-14's Xcode-bundled Swift is 5.10
        # and Ubuntu's default Swift is 6.0.3 — both reject the syntax —
        # so install 6.1 on every runner.
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.1'

      - name: swift --version
        run: swift --version

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test
