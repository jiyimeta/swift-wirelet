name: Examples

# Runs the cross-roundtrip example end-to-end: Swift encoder writes bytes,
# JVM decoder (built from emit-wirelet-kotlin output) reads them back.
# Catches integration regressions the unit + conformance suites miss
# (verify.sh exercises publishToMavenLocal, the CLI, swift run, and the
# JVM build all in one path).

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-roundtrip:
    name: examples/cross-roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.1'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run verify.sh
        run: ./examples/cross-roundtrip/verify.sh

  observable-counter-emulator:
    name: examples/observable-counter (emulator smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Swift
        # swift-actions/setup-swift@v2 has no 6.3.2 in its version manifest.
        # SwiftyLab/setup-swift covers newer toolchains.
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.3.2'

      - name: Install Swift Android SDK
        env:
          # The matching artifact bundle URL for swift-6.3.2-RELEASE Android
          # aarch64 is published on https://www.swift.org/install/. Confirm
          # at run time and adjust if swift.org moves the file.
          SDK_URL: https://download.swift.org/swift-6.3.2-release/android-aarch64/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-android-aarch64-0.1.artifactbundle.tar.gz
        run: |
          swift sdk install "$SDK_URL"
          swift sdk list

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-arm64-v8a

      - name: Create AVD if not cached
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created"

      - name: Run verify.sh on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./examples/observable-counter/verify.sh

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observable-counter-test-reports
          path: examples/observable-counter/android-app/app/build/reports/androidTests/connected/
