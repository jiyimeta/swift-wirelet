name: Examples

# Runs the cross-roundtrip example end-to-end: Swift encoder writes bytes,
# JVM decoder (built from emit-wirelet-kotlin output) reads them back.
# Catches integration regressions the unit + conformance suites miss
# (verify.sh exercises publishToMavenLocal, the CLI, swift run, and the
# JVM build all in one path).

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-roundtrip:
    name: examples/cross-roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.3.2'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run verify.sh
        run: ./examples/cross-roundtrip/verify.sh

  observable-counter-emulator:
    name: examples/observable-counter (emulator smoke)
    # DISABLED in Phase 5. Hosted-runner architecture mismatch:
    # - ubuntu-latest (x86_64) cannot run arm64-v8a system images
    #   (QEMU2: "CPU Architecture not supported on x86_64 host").
    # - ubuntu-24.04-arm exposes no /dev/kvm AND Google does not ship
    #   an `emulator` package for Linux arm64 in sdkmanager.
    # The cross-compiled .so targets aarch64-unknown-linux-android28,
    # so the system image arch is fixed. Migration to macos-latest
    # (Apple Silicon — native arm64 + the emulator binary exists) is
    # the planned follow-up. Local build.sh verifies the pipeline
    # end-to-end in the meantime.
    if: false
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # No KVM step: GitHub-hosted ARM runners do not expose KVM. The
      # arm64-v8a system image runs natively on the arm64 host (no
      # architecture translation needed) so the emulator can boot
      # without KVM acceleration, just slower.

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Swift
        # swift-actions/setup-swift@v2 has no 6.3.2 in its version manifest.
        # SwiftyLab/setup-swift covers newer toolchains.
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: '6.3.2'

      - name: Install Swift Android SDK
        env:
          # Canonical Swift Android SDK URL per https://www.swift.org/install/.
          # The previous `android-aarch64/...-0.1.artifactbundle.tar.gz` form
          # redirects to swift.org/404.html — the real bundle lives under
          # `android-sdk/<release>/<release>_android.artifactbundle.tar.gz`.
          SDK_URL: https://download.swift.org/swift-6.3.2-release/android-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_android.artifactbundle.tar.gz
          # SHA-256 of the artifact bundle above. Recompute via
          # `shasum -a 256` if the URL ever changes.
          SDK_CHECKSUM: 939e933549d12d28f2e0bf71019d734d309859e9773c572657ce565a81f85d68
        run: |
          # swift sdk install does not follow swift.org CDN redirects
          # reliably from the runner. curl handles them cleanly; install
          # from the local copy.
          curl -fSL --retry 3 -o /tmp/swift-android-sdk.tar.gz "$SDK_URL"
          swift sdk install /tmp/swift-android-sdk.tar.gz --checksum "$SDK_CHECKSUM"
          swift sdk list

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-arm64-v8a

      - name: Create AVD if not cached
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created"

      - name: Run verify.sh on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./examples/observable-counter/verify.sh

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observable-counter-test-reports
          path: examples/observable-counter/android-app/app/build/reports/androidTests/connected/
