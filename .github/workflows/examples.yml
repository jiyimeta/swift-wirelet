name: Examples

# Runs the cross-roundtrip example end-to-end: Swift encoder writes bytes,
# JVM decoder (built from emit-wirelet-kotlin output) reads them back.
# Catches integration regressions the unit + conformance suites miss
# (verify.sh exercises publishToMavenLocal, the CLI, swift run, and the
# JVM build all in one path).

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-roundtrip:
    name: examples/cross-roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run verify.sh
        run: ./examples/cross-roundtrip/verify.sh
