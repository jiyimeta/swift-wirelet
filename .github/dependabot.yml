# Dependabot configuration for swift-wirelet.
#
# Covers the three dependency ecosystems present in the repo:
#   - Swift package (root Package.swift / Package.resolved)
#   - Gradle project (the Kotlin runtime + plugin live under kotlin/)
#   - GitHub Actions used by the workflows under .github/workflows
#
# Policy: minor and patch bumps are grouped per ecosystem into a single PR
# to keep volume low. MAJOR bumps are IGNORED here — toolchain/breaking
# upgrades (Kotlin, Gradle, AGP, JUnit, GitHub Action majors, …) are done
# deliberately, not via weekly automated PRs. Dependabot SECURITY updates
# are independent of this version-update config and still apply; keep them
# enabled under Settings → Security (Dependabot alerts + security updates).
#
# The example SwiftPM packages under examples/ are intentionally NOT tracked
# (they are illustrative and pinned for demonstration). Add per-directory
# "swift" entries there only if those examples start shipping real deps.
version: 2

updates:
  # Swift package — root Package.swift / Package.resolved
  # (real external deps: swift-syntax, swift-java-jni-core)
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      swift-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Kotlin Gradle project — kotlin/ (runtime, gradle-plugin, observable-runtime)
  # Also picks up the Gradle wrapper under kotlin/gradle/wrapper/.
  - package-ecosystem: "gradle"
    directory: "/kotlin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # junit-jupiter 5.12+ pulls a junit-platform newer than the launcher
      # Gradle bundles, which breaks `gradle test` with "OutputDirectoryCreator
      # not available; ... unaligned junit-platform-engine and
      # junit-platform-launcher". Pin junit-jupiter (stays 5.10.x) until we add
      # an explicit org.junit.platform:junit-platform-launcher test dependency.
      - dependency-name: "org.junit.jupiter:junit-jupiter"

  # GitHub Actions — workflows under .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
